<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Agents - Log Viewer</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #00ff00;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00ff00;
            text-align: center;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
        }
        
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            background: #003300;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }
        
        button:hover {
            background: #005500;
        }
        
        .log-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .agent-log {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 5px;
            padding: 10px;
            height: 600px;
            overflow-y: auto;
        }
        
        .agent-log h2 {
            color: #ffff00;
            margin-top: 0;
            text-align: center;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
        }
        
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid transparent;
            font-size: 12px;
        }
        
        .log-entry.action {
            border-left-color: #00ffff;
            color: #00ffff;
        }
        
        .log-entry.dialogue {
            border-left-color: #ff00ff;
            color: #ff00ff;
        }
        
        .log-entry.thought {
            border-left-color: #ffff00;
            color: #ffff00;
        }
        
        .log-entry.error {
            border-left-color: #ff0000;
            color: #ff0000;
        }
        
        .log-entry.llm {
            border-left-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
        
        .log-entry.fake {
            border-left-color: #ff6600;
            background: rgba(255, 102, 0, 0.1);
        }
        
        .source-indicator {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .source-indicator.llm {
            background: #00ff00;
            color: #000;
        }
        
        .source-indicator.fake {
            background: #ff6600;
            color: #fff;
        }
        
        .timestamp {
            color: #808080;
            font-size: 10px;
        }
        
        .full-log {
            background: #0a0a0a;
            border: 1px solid #00ff00;
            border-radius: 5px;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 11px;
        }
        
        .status {
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            background: #003300;
            border: 1px solid #00ff00;
            border-radius: 5px;
        }
        
        .status.connected {
            border-color: #00ff00;
            color: #00ff00;
        }
        
        .status.disconnected {
            border-color: #ff0000;
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Generative Agents Log Viewer</h1>
        
        <div class="status" id="status">
            Status: Waiting for connection...
        </div>
        
        <div class="controls">
            <button onclick="clearLogs()">Clear Logs</button>
            <button onclick="toggleAutoScroll()">Toggle Auto-Scroll: ON</button>
            <button onclick="exportLogs()">Export Logs</button>
        </div>
        
        <div class="log-container">
            <div class="agent-log">
                <h2>Isabella Rodriguez</h2>
                <div id="isabella-log"></div>
            </div>
            
            <div class="agent-log">
                <h2>Maria Lopez</h2>
                <div id="maria-log"></div>
            </div>
            
            <div class="agent-log">
                <h2>Klaus Mueller</h2>
                <div id="klaus-log"></div>
            </div>
        </div>
        
        <div class="full-log">
            <h3 style="color: #00ff00; margin-top: 0;">Full System Log</h3>
            <div id="full-log"></div>
        </div>
    </div>
    
    <script>
        let autoScroll = true;
        let logs = {
            isabella: [],
            maria: [],
            klaus: [],
            full: []
        };
        
        // Connessione al backend
        function connectToBackend() {
            // Prova a connettersi al backend reale
            fetch('/api/status')
                .then(response => {
                    if (response.ok) {
                        document.getElementById('status').className = 'status connected';
                        document.getElementById('status').textContent = 'Status: Connected - Real backend';
                        startRealTimeUpdates();
                    } else {
                        throw new Error('Backend not available');
                    }
                })
                .catch(error => {
                    document.getElementById('status').className = 'status disconnected';
                    document.getElementById('status').textContent = 'Status: Backend offline - Using simulation';
                    // Fallback alla simulazione solo se il backend non è disponibile
                    setInterval(simulateLogEntry, 2000);
                });
        }
        
        function startRealTimeUpdates() {
            // Polling per log reali dal backend
            setInterval(() => {
                fetch('/api/logs')
                    .then(response => response.json())
                    .then(data => {
                        if (data.logs) {
                            data.logs.forEach(log => {
                                addLogEntry(log.agent, log.type, log.message, 'llm');
                            });
                        }
                    })
                    .catch(error => {
                        console.log('Backend connection lost, switching to simulation');
                        document.getElementById('status').className = 'status disconnected';
                        document.getElementById('status').textContent = 'Status: Backend offline - Using simulation';
                    });
            }, 1000);
        }
        
        function simulateLogEntry() {
            const agents = ['Isabella', 'Maria', 'Klaus'];
            const types = ['action', 'dialogue', 'thought'];
            const sources = ['llm', 'fake']; // indica se l'azione è da LLM o simulata
            const agent = agents[Math.floor(Math.random() * agents.length)];
            const type = types[Math.floor(Math.random() * types.length)];
            const source = sources[Math.floor(Math.random() * sources.length)];
            
            const messages = {
                action: [
                    'walking to the cafe',
                    'preparing coffee',
                    'cleaning tables',
                    'checking inventory',
                    'greeting customers'
                ],
                dialogue: [
                    'Hello! Welcome to Hobbs Cafe!',
                    'What can I get for you today?',
                    'The weather is lovely today.',
                    'Don\'t forget about the Valentine\'s party!',
                    'Have a wonderful day!'
                ],
                thought: [
                    'thinking about the party preparations',
                    'wondering if we have enough supplies',
                    'remembering to call the supplier',
                    'planning the menu for tomorrow',
                    'considering new coffee recipes'
                ]
            };
            
            const message = messages[type][Math.floor(Math.random() * messages[type].length)];
            addLogEntry(agent, type, message, source);
        }
        
        function addLogEntry(agent, type, message, source = 'llm') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = {
                timestamp: timestamp,
                type: type,
                message: message,
                source: source
            };
            
            // Aggiungi al log dell'agente specifico
            const agentKey = agent.toLowerCase().split(' ')[0];
            if (logs[agentKey]) {
                logs[agentKey].push(entry);
                updateAgentLog(agentKey, entry);
            }
            
            // Aggiungi al log completo
            logs.full.push({...entry, agent: agent});
            updateFullLog({...entry, agent: agent});
        }
        
        function updateAgentLog(agentKey, entry) {
            const logDiv = document.getElementById(`${agentKey}-log`);
            const entryDiv = document.createElement('div');
            entryDiv.className = `log-entry ${entry.type} ${entry.source}`;
            
            const sourceLabel = entry.source === 'llm' ? 'LLM' : 'FAKE';
            entryDiv.innerHTML = `
                <span class="source-indicator ${entry.source}">${sourceLabel}</span>
                <span class="timestamp">[${entry.timestamp}]</span>
                ${entry.message}
            `;
            logDiv.appendChild(entryDiv);
            
            if (autoScroll) {
                logDiv.scrollTop = logDiv.scrollHeight;
            }
        }
        
        function updateFullLog(entry) {
            const logDiv = document.getElementById('full-log');
            const entryDiv = document.createElement('div');
            entryDiv.className = `log-entry ${entry.type} ${entry.source}`;
            entryDiv.style.color = entry.type === 'action' ? '#00ffff' : 
                                   entry.type === 'dialogue' ? '#ff00ff' : '#ffff00';
            
            const sourceLabel = entry.source === 'llm' ? 'LLM' : 'FAKE';
            entryDiv.innerHTML = `
                <span class="source-indicator ${entry.source}">${sourceLabel}</span>
                <span class="timestamp">[${entry.timestamp}]</span>
                <strong>${entry.agent}:</strong> ${entry.message}
            `;
            logDiv.appendChild(entryDiv);
            
            if (autoScroll) {
                logDiv.scrollTop = logDiv.scrollHeight;
            }
        }
        
        function clearLogs() {
            document.getElementById('isabella-log').innerHTML = '';
            document.getElementById('maria-log').innerHTML = '';
            document.getElementById('klaus-log').innerHTML = '';
            document.getElementById('full-log').innerHTML = '';
            logs = {
                isabella: [],
                maria: [],
                klaus: [],
                full: []
            };
        }
        
        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            event.target.textContent = `Toggle Auto-Scroll: ${autoScroll ? 'ON' : 'OFF'}`;
        }
        
        function exportLogs() {
            const logText = JSON.stringify(logs, null, 2);
            const blob = new Blob([logText], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `agent_logs_${new Date().toISOString()}.json`;
            a.click();
        }
        
        // Avvia la connessione quando la pagina è caricata
        window.onload = function() {
            connectToBackend();
        };
    </script>
</body>
</html>
