{% load staticfiles %}

<div id="step" style="display:none">{{step}}</div>
<div id="sim_code" style="display:none">{{sim_code}}</div>
<div id="persona_name_list" style="display:none">{{persona_name_str}}</div>
<div id="persona_init_pos" style="display:none">
    {% for i in persona_init_pos %}
        <span>{{i.0}},{{i.1}},{{i.2}}</span>
    {% endfor %}
</div>

<script type="text/javascript">
    // ###########################################################################
    // PREAMBLE
    // ###########################################################################

    let step = parseInt(document.getElementById('step').innerHTML) || 2;
    let sim_code = document.getElementById('sim_code').innerHTML || "test-simulation-22";
    
    let spans = document.getElementById('persona_init_pos').getElementsByTagName('span');
    let persona_names = {};
    for(var i = 0, l = spans.length; i < l; i++){
        let x = spans[i].innerText.split(",");
        persona_names[x[0]] = [parseInt(x[1]), parseInt(x[2])]
    }

    // Phaser configuration
    const config = {
        type: Phaser.AUTO,
        width: 1400,
        height: 700,
        parent: "game-container",
        pixelArt: true,
        physics: {
            default: "arcade",
            arcade: {
                gravity: { y: 0 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        },
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        }
    };

    const game = new Phaser.Game(config);
    let cursors;
    let player;
    let showDebug = false;

    // Persona related variables
    var spawn_tile_loc = {};
    for (var key in persona_names){
        spawn_tile_loc[key] = persona_names[key];
    }
    console.log("Initial spawn locations:", spawn_tile_loc);

    var personas = {};
    var pronunciatios = {};
    let anims_direction;
    let pre_anims_direction;
    let pre_anims_direction_dict = {};

    let curr_maze = "the_ville";
    let tile_width = 32;
    let movement_speed = 8; // Reduced for smoother movement
    
    // Timer configuration - faster updates
    let timer_max = 2; // Reduced for more responsive updates
    let timer = timer_max;

    let phase = "update"; // Start with update to read existing movement data
    
    let execute_movement;
    let execute_count_max = tile_width/movement_speed;
    let execute_count = execute_count_max;
    let movement_target = {};
    
    // Error handling and retry logic
    let retryCount = 0;
    let maxRetries = 3;
    
    // ###########################################################################
    // ENGINE
    // ###########################################################################

    function preload() {  
        console.log("Preloading assets...");
        
        // Load map assets
        this.load.image("blocks_1", "{% static 'assets/the_ville/visuals/map_assets/blocks/blocks_1.png' %}");
        this.load.image("walls", "{% static 'assets/the_ville/visuals/map_assets/v1/Room_Builder_32x32.png' %}");
        this.load.image("interiors_pt1", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt1.png' %}");
        this.load.image("interiors_pt2", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt2.png' %}");
        this.load.image("interiors_pt3", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt3.png' %}");
        this.load.image("interiors_pt4", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt4.png' %}");
        this.load.image("interiors_pt5", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt5.png' %}");
        this.load.image("CuteRPG_Field_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_B.png' %}");
        this.load.image("CuteRPG_Field_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_C.png' %}");
        this.load.image("CuteRPG_Harbor_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Harbor_C.png' %}");
        this.load.image("CuteRPG_Village_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Village_B.png' %}");
        this.load.image("CuteRPG_Forest_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_B.png' %}");
        this.load.image("CuteRPG_Desert_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_C.png' %}");
        this.load.image("CuteRPG_Mountains_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Mountains_B.png' %}");
        this.load.image("CuteRPG_Desert_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_B.png' %}");
        this.load.image("CuteRPG_Forest_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_C.png' %}");

        this.load.tilemapTiledJSON("map", "{% static 'assets/the_ville/visuals/the_ville_jan7.json' %}");
        
        // Character atlas
        this.load.atlas("atlas", 
            "https://mikewesthad.github.io/phaser-3-tilemap-blog-posts/post-1/assets/atlas/atlas.png", 
            "https://mikewesthad.github.io/phaser-3-tilemap-blog-posts/post-1/assets/atlas/atlas.json");
        
        // Load event handlers
        this.load.on('loaderror', function (file) {
            console.error('Error loading:', file.src);
        });
    }

    function create() {  
        console.log("Creating game world...");
        
        const map = this.make.tilemap({ key: "map" });
        
        // Add tilesets
        const collisions = map.addTilesetImage("blocks", "blocks_1");
        const walls = map.addTilesetImage("Room_Builder_32x32", "walls");
        const interiors_pt1 = map.addTilesetImage("interiors_pt1", "interiors_pt1");
        const interiors_pt2 = map.addTilesetImage("interiors_pt2", "interiors_pt2");
        const interiors_pt3 = map.addTilesetImage("interiors_pt3", "interiors_pt3");
        const interiors_pt4 = map.addTilesetImage("interiors_pt4", "interiors_pt4");
        const interiors_pt5 = map.addTilesetImage("interiors_pt5", "interiors_pt5");
        const CuteRPG_Field_B = map.addTilesetImage("CuteRPG_Field_B", "CuteRPG_Field_B");
        const CuteRPG_Field_C = map.addTilesetImage("CuteRPG_Field_C", "CuteRPG_Field_C");
        const CuteRPG_Harbor_C = map.addTilesetImage("CuteRPG_Harbor_C", "CuteRPG_Harbor_C");
        const CuteRPG_Village_B = map.addTilesetImage("CuteRPG_Village_B", "CuteRPG_Village_B");
        const CuteRPG_Forest_B = map.addTilesetImage("CuteRPG_Forest_B", "CuteRPG_Forest_B");
        const CuteRPG_Desert_C = map.addTilesetImage("CuteRPG_Desert_C", "CuteRPG_Desert_C");
        const CuteRPG_Mountains_B = map.addTilesetImage("CuteRPG_Mountains_B", "CuteRPG_Mountains_B");
        const CuteRPG_Desert_B = map.addTilesetImage("CuteRPG_Desert_B", "CuteRPG_Desert_B");
        const CuteRPG_Forest_C = map.addTilesetImage("CuteRPG_Forest_C", "CuteRPG_Forest_C");

        // Create layers
        let tileset_group_1 = [CuteRPG_Field_B, CuteRPG_Field_C, CuteRPG_Harbor_C, CuteRPG_Village_B, 
                               CuteRPG_Forest_B, CuteRPG_Desert_C, CuteRPG_Mountains_B, CuteRPG_Desert_B, CuteRPG_Forest_C,
                               interiors_pt1, interiors_pt2, interiors_pt3, interiors_pt4, interiors_pt5, walls];
        
        const bottomGroundLayer = map.createLayer("Bottom Ground", tileset_group_1, 0, 0);
        const exteriorGroundLayer = map.createLayer("Exterior Ground", tileset_group_1, 0, 0);
        const exteriorDecorationL1Layer = map.createLayer("Exterior Decoration L1", tileset_group_1, 0, 0);
        const exteriorDecorationL2Layer = map.createLayer("Exterior Decoration L2", tileset_group_1, 0, 0);
        const interiorGroundLayer = map.createLayer("Interior Ground", tileset_group_1, 0, 0);
        const wallLayer = map.createLayer("Wall", [CuteRPG_Field_C, walls], 0, 0);
        const interiorFurnitureL1Layer = map.createLayer("Interior Furniture L1", tileset_group_1, 0, 0);
        const interiorFurnitureL2Layer = map.createLayer("Interior Furniture L2 ", tileset_group_1, 0, 0);
        const foregroundL1Layer = map.createLayer("Foreground L1", tileset_group_1, 0, 0);
        const foregroundL2Layer = map.createLayer("Foreground L2", tileset_group_1, 0, 0);
        
        foregroundL1Layer.setDepth(2);
        foregroundL2Layer.setDepth(2);

        const collisionsLayer = map.createLayer("Collisions", collisions, 0, 0);
        collisionsLayer.setCollisionByProperty({ collide: true });
        collisionsLayer.setDepth(-1);

        // Set up camera - center on map initially
        const mapCenterX = map.widthInPixels / 2;
        const mapCenterY = map.heightInPixels / 2;
        
        player = this.physics.add.sprite(mapCenterX, mapCenterY, "atlas", "misa-front")
            .setSize(30, 40)
            .setOffset(0, 0);
        player.setDepth(-1);
        player.setAlpha(0); // Make camera anchor invisible
        
        const camera = this.cameras.main;
        camera.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
        camera.centerOn(mapCenterX, mapCenterY);
        camera.startFollow(player);
        camera.setZoom(0.8); // Zoom out slightly to see more of the map
        cursors = this.input.keyboard.createCursorKeys();

        // Set up personas
        console.log("Creating personas:", Object.keys(spawn_tile_loc));
        const persona_count = Object.keys(spawn_tile_loc).length;
        document.getElementById('agent-count').textContent = persona_count;
        
        if (persona_count === 0) {
            console.error("No personas found! Check spawn_tile_loc:", spawn_tile_loc);
            // Create default test agents if none found
            const defaultAgents = [
                ["Isabella Rodriguez", 32, 10],
                ["Maria Lopez", 35, 12], 
                ["Klaus Mueller", 28, 8]
            ];
            
            defaultAgents.forEach((agent, index) => {
                let [name, x, y] = agent;
                spawn_tile_loc[name] = [x, y];
            });
        }
        
        for (let persona_name of Object.keys(spawn_tile_loc)) { 
            let start_pos = [
                spawn_tile_loc[persona_name][0] * tile_width + tile_width / 2, 
                spawn_tile_loc[persona_name][1] * tile_width + tile_width / 2
            ];
            
            console.log(`Creating ${persona_name} at tile (${spawn_tile_loc[persona_name][0]}, ${spawn_tile_loc[persona_name][1]}) = pixel (${start_pos[0]}, ${start_pos[1]})`);
            
            let new_sprite = this.physics.add
                .sprite(start_pos[0], start_pos[1], "atlas", "misa-front")
                .setSize(30, 40)
                .setOffset(0, 24)
                .setDepth(1); // Make sure agents are visible above ground
            
            // Add collision with collision layer
            this.physics.add.collider(new_sprite, collisionsLayer);
            
            personas[persona_name] = new_sprite;
            
            // Create name label (more visible than emoji)
            let initials = persona_name.split(' ').map(n => n[0]).join('');
            pronunciatios[persona_name] = this.add.text(
                start_pos[0] - 20, 
                start_pos[1] - 60,
                initials, {
                font: "bold 16px Arial", 
                fill: "#ffffff", 
                stroke: "#000000",
                strokeThickness: 2,
                padding: { x: 6, y: 4}, 
                backgroundColor: "rgba(0, 100, 200, 0.8)",
                borderRadius: 8
            }).setDepth(5).setOrigin(0.5);
            
            // Initialize movement target
            movement_target[persona_name] = [start_pos[0], start_pos[1]];
            pre_anims_direction_dict[persona_name] = "d";
        }
        
        console.log("All personas created:", Object.keys(personas));
        console.log("Movement targets initialized:", movement_target);

        // Create animations
        const anims = this.anims;
        anims.create({
            key: "misa-left-walk",
            frames: anims.generateFrameNames("atlas", { 
                prefix: "misa-left-walk.", start: 0, end: 3, zeroPad: 3 
            }),
            frameRate: 8,
            repeat: -1 
        });

        anims.create({
            key: "misa-right-walk",
            frames: anims.generateFrameNames("atlas", { 
                prefix: "misa-right-walk.", start: 0, end: 3, zeroPad: 3 
            }),
            frameRate: 8,
            repeat: -1 
        });

        anims.create({
            key: "misa-front-walk",
            frames: anims.generateFrameNames("atlas", { 
                prefix: "misa-front-walk.", start: 0, end: 3, zeroPad: 3 
            }),
            frameRate: 8,
            repeat: -1 
        });

        anims.create({
            key: "misa-back-walk",
            frames: anims.generateFrameNames("atlas", { 
                prefix: "misa-back-walk.", start: 0, end: 3, zeroPad: 3 
            }),
            frameRate: 8,
            repeat: -1 
        });
        
        // Add debug info display
        this.add.text(10, 10, "Agents:", {
            font: "16px Arial",
            fill: "#00ff00",
            backgroundColor: "rgba(0,0,0,0.7)",
            padding: { x: 5, y: 5 }
        }).setDepth(10).setScrollFactor(0);
        
        this.add.text(10, 40, () => {
            let agentInfo = [];
            for (let name in personas) {
                let agent = personas[name];
                agentInfo.push(`${name}: (${Math.floor(agent.x/32)}, ${Math.floor(agent.y/32)})`);
            }
            return agentInfo.join('\n');
        }, {
            font: "12px Arial",
            fill: "#ffffff",
            backgroundColor: "rgba(0,0,0,0.7)",
            padding: { x: 5, y: 5 }
        }).setDepth(10).setScrollFactor(0);
        
        // Start the simulation immediately
        console.log("Game world created, starting simulation...");
        console.log("Map dimensions:", map.widthInPixels, "x", map.heightInPixels);
        console.log("Camera bounds:", camera.getBounds());
    }

    function update(time, delta) {
        // Update FPS counter
        if (typeof updateFPS === 'function') {
            updateFPS(time);
        }
        
        // Update debug info
        document.getElementById('current-step').textContent = step;
        document.getElementById('current-phase').textContent = phase;
        
        // Handle play/pause buttons
        let play_context = this;
        play_button.onclick = function(){
            play_context.scene.resume();
            console.log("Game resumed");
        };
        pause_button.onclick = function(){
            play_context.scene.pause();
            console.log("Game paused");
        };

        // Move camera
        const camera_speed = 400;
        player.body.setVelocity(0);
        if (cursors.left.isDown) {
            player.body.setVelocityX(-camera_speed);
        } 
        if (cursors.right.isDown) {
            player.body.setVelocityX(camera_speed);
        } 
        if (cursors.up.isDown) {
            player.body.setVelocityY(-camera_speed);
        } 
        if (cursors.down.isDown) {
            player.body.setVelocityY(camera_speed);
        }

        // Main simulation logic
        if (phase == "process") {
            document.getElementById('update-status').classList.add('active');
            document.getElementById('update-status-text').textContent = 'Processing...';
            
            // Send current positions to backend
            let data = {
                "step": step, 
                "sim_code": sim_code,
                "environment": {}
            };
            
            for (let persona_name in personas) {
                data["environment"][persona_name] = {
                    "maze": curr_maze,
                    "x": Math.floor(personas[persona_name].x / tile_width),
                    "y": Math.floor(personas[persona_name].y / tile_width)
                };
                
                // Update position display
                let pos_text = `(${data["environment"][persona_name].x}, ${data["environment"][persona_name].y})`;
                document.getElementById(`position__${persona_name.replace(/ /g,"_")}`).textContent = pos_text;
            }
            
            console.log("Sending data to backend:", data);
            
            var json = JSON.stringify(data);
            var retrieve_xobj = new XMLHttpRequest();
            retrieve_xobj.overrideMimeType("application/json");
            retrieve_xobj.open('POST', "{% url 'process_environment' %}", true);
            retrieve_xobj.setRequestHeader('Content-Type', 'application/json');
            retrieve_xobj.onreadystatechange = function() {
                if (retrieve_xobj.readyState === 4) {
                    if (retrieve_xobj.status === 200) {
                        console.log("Process response:", retrieve_xobj.responseText);
                        retryCount = 0;
                    } else {
                        console.error("Process error:", retrieve_xobj.status);
                    }
                }
            };
            retrieve_xobj.send(json);   
            
            phase = "update";
        } 
        else if (phase == "update") { 
            document.getElementById('update-status-text').textContent = 'Waiting for backend...';
            
            if (timer <= 0) {
                var update_xobj = new XMLHttpRequest();
                update_xobj.overrideMimeType("application/json");
                update_xobj.open('POST', "{% url 'update_environment' %}", true);
                update_xobj.setRequestHeader('Content-Type', 'application/json');
                update_xobj.addEventListener("load", function() {
                    if (this.readyState === 4) {
                        try {
                            let response = JSON.parse(update_xobj.responseText);
                            console.log("Update response:", response);
                            
                            console.log(`Response step: ${response["<step>"]}, Current step: ${step}`);
                            
                            if (response["<step>"] === step || response["<step>"] >= step) {
                                if (response.persona && Object.keys(response.persona).length > 0) {
                                    console.log("✅ Got movement data:", response.persona);
                                    execute_movement = response;
                                    phase = "execute";
                                    execute_count = execute_count_max;
                                    document.getElementById('update-status').classList.remove('active');
                                    document.getElementById('update-status-text').textContent = 'Executing...';
                                    retryCount = 0;
                                } else {
                                    console.log("⚠ No persona data in response");
                                }
                            } else if (response["<step>"] === -1) {
                                console.log("⏳ Backend not ready for step", step);
                            } else {
                                console.log("🔄 Step mismatch, backend at", response["<step>"]);
                            }
                        } catch (e) {
                            console.error("Error parsing response:", e, "Raw response:", update_xobj.responseText);
                            if (retryCount < maxRetries) {
                                retryCount++;
                                console.log(`Retry ${retryCount}/${maxRetries}`);
                            } else {
                                console.error("Max retries reached, skipping step");
                                step++;
                                phase = "process";
                                retryCount = 0;
                            }
                        }
                    }
                });
                update_xobj.send(JSON.stringify({"step": step, "sim_code": sim_code }));   
                timer = timer_max;
            }
            timer = timer - 1; 
        } 
        else { // execute phase
            document.getElementById('update-status-text').textContent = 'Moving agents...';
            
            if (execute_movement && execute_movement["meta"]) {
                document.getElementById("game-time-content").innerHTML = execute_movement["meta"]["curr_time"];
            }
            
            for (let curr_persona_name in personas) {
                let curr_persona = personas[curr_persona_name];
                let curr_pronunciatio = pronunciatios[curr_persona_name];

                if (execute_count == execute_count_max && execute_movement["persona"][curr_persona_name]) { 
                    let movement_data = execute_movement["persona"][curr_persona_name];
                    let curr_x = movement_data["movement"][0];
                    let curr_y = movement_data["movement"][1];
                    movement_target[curr_persona_name] = [curr_x * tile_width, curr_y * tile_width]; 
                    
                    // Update pronunciatio
                    let pronunciatio_content = movement_data["pronunciatio"] || "💭";
                    let rgx = new RegExp(/(\p{L}{1})\p{L}+/, 'gu');
                    let initials = [...curr_persona_name.matchAll(rgx)] || [];
                    initials = ((initials.shift()?.[1] || '') + (initials.pop()?.[1] || '')).toUpperCase();
                    
                    if (pronunciatio_content && pronunciatio_content !== "💭") {
                        pronunciatios[curr_persona_name].setText(initials + ": " + pronunciatio_content);
                    }
                }

                if (execute_count > 0) {
                    // Smooth movement with speed multiplier
                    let move_speed = movement_speed * speedMultiplier;
                    let target_x = movement_target[curr_persona_name][0];
                    let target_y = movement_target[curr_persona_name][1];
                    
                    // Add movement trail
                    if (debugMode && execute_count % 4 === 0) {
                        addMovementTrail(curr_persona_name, curr_persona.x, curr_persona.y);
                    }
                    
                    if (Math.abs(curr_persona.x - target_x) > move_speed) {
                        if (curr_persona.x < target_x) {
                            curr_persona.x += move_speed;
                            anims_direction = "r";
                            pre_anims_direction_dict[curr_persona_name] = "r";
                        } else {
                            curr_persona.x -= move_speed;
                            anims_direction = "l";
                            pre_anims_direction_dict[curr_persona_name] = "l";
                        }
                    } else if (Math.abs(curr_persona.y - target_y) > move_speed) {
                        if (curr_persona.y < target_y) {
                            curr_persona.y += move_speed;
                            anims_direction = "d";
                            pre_anims_direction_dict[curr_persona_name] = "d";
                        } else {
                            curr_persona.y -= move_speed;
                            anims_direction = "u";
                            pre_anims_direction_dict[curr_persona_name] = "u";
                        }
                    } else {
                        curr_persona.x = target_x;
                        curr_persona.y = target_y;
                        anims_direction = "";
                    }

                    // Update pronunciatio position
                    curr_pronunciatio.x = curr_persona.x;
                    curr_pronunciatio.y = curr_persona.y - 60;

                    // Play animations
                    if (anims_direction == "l") {
                        curr_persona.anims.play("misa-left-walk", true);
                    } else if (anims_direction == "r") {
                        curr_persona.anims.play("misa-right-walk", true);
                    } else if (anims_direction == "u") {
                        curr_persona.anims.play("misa-back-walk", true);
                    } else if (anims_direction == "d") {
                        curr_persona.anims.play("misa-front-walk", true);
                    } else {
                        curr_persona.anims.stop();
                        // Set idle frame
                        if (pre_anims_direction_dict[curr_persona_name] == "l") 
                            curr_persona.setTexture("atlas", "misa-left");
                        else if (pre_anims_direction_dict[curr_persona_name] == "r") 
                            curr_persona.setTexture("atlas", "misa-right");
                        else if (pre_anims_direction_dict[curr_persona_name] == "u") 
                            curr_persona.setTexture("atlas", "misa-back");
                        else if (pre_anims_direction_dict[curr_persona_name] == "d") 
                            curr_persona.setTexture("atlas", "misa-front");
                    }
                } 
                else {
                    // Ensure final position
                    curr_persona.x = movement_target[curr_persona_name][0];
                    curr_persona.y = movement_target[curr_persona_name][1];
                    
                    phase = "process";
                    execute_count = execute_count_max + 1;
                    step = step + 1;
                }
            }

            // Update UI with action descriptions
            if (execute_count == execute_count_max && execute_movement) { 
                for (let curr_persona_name in personas) {
                    if (execute_movement["persona"][curr_persona_name]) {
                        let curr_persona_name_os = curr_persona_name.replace(/ /g,"_");
                        let persona_data = execute_movement["persona"][curr_persona_name];
                        let description_content = persona_data["description"] || "";
                        
                        let action_parts = description_content.split("@");
                        document.getElementById("current_action__"+curr_persona_name_os).innerHTML = 
                            action_parts[0] || "Idle";
                        document.getElementById("target_address__"+curr_persona_name_os).innerHTML = 
                            action_parts[1] || "Unknown";
                        
                        // Handle chat
                        let chat_content = "";
                        if (persona_data["chat"] != null && persona_data["chat"].length > 0) {
                            for (let j=0; j<persona_data["chat"].length; j++) { 
                                chat_content += persona_data["chat"][j][0] + ": " + 
                                               persona_data["chat"][j][1] + "<br>";
                            }
                            
                            // Show chat bubble on map
                            if (personas[curr_persona_name]) {
                                showChatBubble(
                                    curr_persona_name, 
                                    persona_data["chat"][0][1], 
                                    personas[curr_persona_name].x, 
                                    personas[curr_persona_name].y
                                );
                            }
                        } else {
                            chat_content = "<em>None at the moment</em>";
                        }
                        document.getElementById("chat__"+curr_persona_name_os).innerHTML = chat_content;
                    }
                }
            }

            execute_count = execute_count - 1;
        }
    }

    // Control button binders
    var play_button = document.getElementById("play_button");
    var pause_button = document.getElementById("pause_button");
    
    // Error handling
    window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Error: ', msg, '\nURL: ', url, '\nLine: ', lineNo, '\nColumn: ', columnNo, '\nError object: ', error);
        return false;
    };
</script>
