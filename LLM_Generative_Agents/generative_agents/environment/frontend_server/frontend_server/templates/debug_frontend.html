<!DOCTYPE html>
<html>
<head>
    <title>Frontend Debug</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #0f0; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border: 1px solid #0f0; }
        .error { color: #f00; border-color: #f00; }
        .success { color: #0f0; border-color: #0f0; }
        button { background: #333; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px; cursor: pointer; }
        button:hover { background: #555; }
        pre { background: #000; padding: 10px; overflow: auto; max-height: 400px; }
    </style>
</head>
<body>
    <h1>🔧 Generative Agents - Frontend Debugger</h1>
    
    <div id="status" class="status">Checking system status...</div>
    
    <div>
        <h2>Quick Tests:</h2>
        <button onclick="checkBackend()">Test Backend Connection</button>
        <button onclick="checkAssets()">Check Assets</button>
        <button onclick="checkSimulation()">Check Current Simulation</button>
        <button onclick="loadDemo()">Load Demo</button>
        <button onclick="clearCache()">Clear Cache</button>
    </div>
    
    <div>
        <h2>Available Simulations:</h2>
        <div id="simulations"></div>
    </div>
    
    <div>
        <h2>Console Output:</h2>
        <pre id="console"></pre>
    </div>
    
    <script>
        const log = (msg, type='info') => {
            const console = document.getElementById('console');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#f00' : type === 'success' ? '#0f0' : '#ff0';
            console.innerHTML += `<span style="color: ${color}">[${timestamp}] ${msg}</span>\n`;
            console.scrollTop = console.scrollHeight;
        };
        
        const updateStatus = (msg, isError=false) => {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = isError ? 'status error' : 'status success';
        };
        
        async function checkBackend() {
            log('Checking backend connection...');
            try {
                const response = await fetch('/check_backend_connection');
                const data = await response.json();
                if (data.status === 'online') {
                    log('✓ Backend is online', 'success');
                    updateStatus('Backend Connected', false);
                } else {
                    log('✗ Backend is offline', 'error');
                    updateStatus('Backend Offline - Start reverie.py', true);
                }
            } catch (e) {
                log(`Backend check failed: ${e.message}`, 'error');
                updateStatus('Backend Connection Failed', true);
            }
        }
        
        async function checkAssets() {
            log('Checking game assets...');
            const assets = [
                '/static/assets/the_ville/matrix/maze_meta_info.json',
                '/static/assets/the_ville/visuals/the_ville_v3.png',
                '/static/assets/characters/Isabella_Rodriguez.png'
            ];
            
            for (const asset of assets) {
                try {
                    const response = await fetch(asset, {method: 'HEAD'});
                    if (response.ok) {
                        log(`✓ Found: ${asset}`, 'success');
                    } else {
                        log(`✗ Missing: ${asset}`, 'error');
                    }
                } catch (e) {
                    log(`✗ Error checking: ${asset}`, 'error');
                }
            }
        }
        
        async function checkSimulation() {
            log('Checking current simulation...');
            try {
                const response = await fetch('/get_curr_sim_code');
                const data = await response.json();
                log(`Current simulation: ${data.sim_code || 'None'}`, 'success');
                
                // Check simulation files
                if (data.sim_code) {
                    const simPath = `/storage/${data.sim_code}/`;
                    log(`Simulation path: ${simPath}`);
                }
            } catch (e) {
                log('No active simulation', 'error');
            }
        }
        
        async function loadDemo() {
            log('Loading demo simulation...');
            window.open('/demo/July1_the_ville_isabella_maria_klaus-step-3-20/1/3/', '_blank');
        }
        
        function clearCache() {
            log('Clearing cache...');
            localStorage.clear();
            sessionStorage.clear();
            log('Cache cleared', 'success');
            setTimeout(() => location.reload(), 1000);
        }
        
        async function listSimulations() {
            log('Listing available simulations...');
            const simulations = [
                'test-simulation',
                'test-simulation-4',
                'test-simulation-5',
                'July1_the_ville_isabella_maria_klaus-step-3-20'
            ];
            
            const simsDiv = document.getElementById('simulations');
            simsDiv.innerHTML = '';
            
            for (const sim of simulations) {
                const btn = document.createElement('button');
                btn.textContent = sim;
                btn.onclick = () => {
                    log(`Opening simulation: ${sim}`);
                    window.open(`/replay/${sim}/1/`, '_blank');
                };
                simsDiv.appendChild(btn);
            }
        }
        
        // Auto-check on load
        window.onload = async () => {
            await checkBackend();
            await listSimulations();
            log('Debug interface ready', 'success');
        };
    </script>
</body>
</html>
